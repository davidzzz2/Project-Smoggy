# Example configuration for the Smoggy Bayesian hierarchical logistic model
label_column: cancer_signal
feature_columns:
  - cfDNA_methyl_entropy
  - fragment_ratio_small
  - fragment_ratio_medium
  - fragment_ratio_large
  - protein_panel_score
  - ctDNA_burden
site_column: enrollment_site
covariates:
  - name: age
    prior_mu: 0.05
    prior_sigma: 0.5
  - name: smoking_pack_years
    prior_mu: 0.03
    prior_sigma: 0.4
  - name: sex_male
    prior_mu: 0.0
    prior_sigma: 0.3
standardize_features: true
standardize_covariates: true
target_positive_label: 1
draws: 1000
tune: 1000
chains: 4
random_seed: 20260316
